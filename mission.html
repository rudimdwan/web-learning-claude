<!DOCTYPE html>
<html>
<head>
    <title>Mission Detail</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .mission { margin: 20px; padding: 20px; border: 1px solid #ccc; border-radius: 5px; }
        form { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="mission">
        <h1>Mission Title</h1>
        <p>Details about the mission will go here...</p>
        <form>
            <label for="completion">Mark Mission as Completed:</label>
            <input type="checkbox" id="completion" name="completion">
            <input type="submit" value="Submit">
        </form>
    </div>
</body>
</html>
